<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro IoT Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-emerald-400 mb-2">Pro Monitor</h1>
        <p class="text-slate-400 mb-8">ESP32 + Supabase Realtime</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-8 text-center">
                <span class="text-xs uppercase text-slate-400">Temperature</span>
                <div id="temp" class="text-5xl font-bold my-2">--°C</div>
            </div>
            <div class="glass p-8 text-center">
                <span class="text-xs uppercase text-slate-400">Humidity</span>
                <div id="humi" class="text-5xl font-bold my-2">--%</div>
            </div>
        </div>

        <div class="glass p-6 h-80 mb-8">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://iqdfxyghfgvxuzodinqt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZGZ4eWdoZmd2eHV6b2RpbnF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDcyMTYsImV4cCI6MjA4NzMyMzIxNn0.K9GY5KDLzN-dSU7a947vqG72DBgDmzXYz_MzbCxrJdU';

        let iotClient;

        // --- INITIALIZATION ---
        function initSystem() {
            // This checks if the library loaded as 'supabase' or 'lib'
            const creator = window.supabase || window.lib;
            
            if (!creator) {
                console.error("Critical Error: Supabase library failed to load from CDN.");
                alert("Library Load Error. Check Internet Connection.");
                return;
            }

            iotClient = creator.createClient(SB_URL, SB_KEY);
            console.log("System: Supabase Client Initialized");

            setupChart();
            loadHistory();
            startRealtime();
        }

        // --- CHART LOGIC ---
        let chart;
        function setupChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Temperature',
                        data: [],
                        borderColor: '#10b981',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)'
                    }]
                },
                options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#1e293b' } } } }
            });
        }

        // --- DATA LOGIC ---
        async function loadHistory() {
            const { data, error } = await iotClient
                .from('sensor_data')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(10);

            if (data) {
                data.reverse().forEach(row => {
                    chart.data.labels.push(new Date(row.created_at).toLocaleTimeString());
                    chart.data.datasets[0].data.push(row.temperature);
                });
                chart.update();
                document.getElementById('temp').innerText = data[data.length-1].temperature + "°C";
                document.getElementById('humi').innerText = data[data.length-1].humidity + "%";
            }
        }

        function startRealtime() {
            iotClient
                .channel('iot-room')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sensor_data' }, payload => {
                    console.log("Live Update:", payload.new);
                    const { temperature, humidity } = payload.new;
                    
                    document.getElementById('temp').innerText = temperature + "°C";
                    document.getElementById('humi').innerText = humidity + "%";

                    chart.data.labels.push(new Date().toLocaleTimeString());
                    chart.data.datasets[0].data.push(temperature);
                    if(chart.data.labels.length > 10) chart.data.labels.shift();
                    chart.update();
                })
                .subscribe();
        }

        // Run when window loads
        window.onload = initSystem;
    </script>
</body>
</html>
