<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Secure Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
<body>

<div class="container">
    <div id="status-bar"><span class="status" id="dot"></span> <span id="stat-text">System Live</span></div>
    <h1>Smart Monitor</h1>

    <div class="stats-grid">
        <div class="card" id="temp-card">
            <h3>Temperature</h3>
            <h2 id="temp">--°</h2>
        </div>
        <div class="card">
            <h3>Humidity</h3>
            <h2 id="humi">--%</h2>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="card" style="width: 100%; height: 300px; margin-bottom: 25px;">
    <h3>24-Hour Trend</h3>
    <canvas id="tempChart"></canvas>
</div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

    <div id="login-form" class="settings-panel">
        <h3>Admin Login</h3>
        <input type="email" id="email" placeholder="Email" style="width: 90%; margin-bottom: 10px;"><br>
        <input type="password" id="password" placeholder="Password" style="width: 90%;"><br>
        <button onclick="login()">Sign In to Edit</button>
    </div>

    <div id="admin-panel" class="settings-panel" style="display: none;">
        <h3>Control Panel</h3>
        <label>Alert Threshold (°C)</label><br><br>
        <input type="number" id="thresholdInput" value="30">
        <button onclick="updateThreshold()">Update System</button>
        <button onclick="logout()" style="background: transparent; color: #666; font-size: 0.8rem; margin-top: 10px;">Logout</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://your-project.supabase.co';
    const supabaseKey = 'YOUR_ANON_KEY';
    const supabase = lib.createClient(supabaseUrl, supabaseKey);

    // 1. REAL-TIME DATA FETCHING (Public)
    supabase
        .channel('schema-db-changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'sensor_data' }, payload => {
            const t = payload.new.temperature;
            document.getElementById('temp').innerText = t + "°C";
            document.getElementById('humi').innerText = payload.new.humidity + "%";
            
            // Visual Alarm Logic
            const limit = document.getElementById('thresholdInput').value;
            if(t > limit) {
                document.getElementById('temp-card').style.background = "#ff4d4d";
                document.getElementById('dot').classList.add('alarm-active');
            } else {
                document.getElementById('temp-card').style.background = "white";
                document.getElementById('dot').classList.remove('alarm-active');
            }
        })
        .subscribe();

    // 2. AUTHENTICATION LOGIC
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert(error.message);
        } else {
            showAdmin();
        }
    }

    function showAdmin() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // 3. SECURE UPDATE (Requires Auth Token)
    async function updateThreshold() {
        const val = document.getElementById('thresholdInput').value;
        const { error } = await supabase
            .from('settings')
            .update({ temp_threshold: val })
            .eq('id', 1);

        if (error) alert("Error: " + error.message);
        else alert("Threshold synchronized with ESP32!");
    }
</script>
</body>
</html>
